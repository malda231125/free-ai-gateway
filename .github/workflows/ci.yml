name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev
      - run: npm run build
      - name: Boot smoke test
        run: |
          PORT=3100 node dist/main.js &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            curl -sf http://localhost:3100/health && break
            sleep 1
          done
          curl -sf http://localhost:3100/health
          curl -sf http://localhost:3100/v1/providers > /dev/null
          kill $SERVER_PID

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t free-ai-gateway:ci .
      - name: Boot smoke test (container)
        run: |
          docker run -d --rm -p 3200:3000 --name gw-ci free-ai-gateway:ci
          for i in $(seq 1 20); do
            curl -sf http://localhost:3200/health && break
            sleep 1
          done
          curl -sf http://localhost:3200/health
          docker stop gw-ci
